<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
    <title id="title">Students building technology projects</title>
    <desc id="desc">A technology club workspace with laptops, code panels, circuit patterns, and students collaborating.</desc>
    <defs>
        <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#10233f"/>
            <stop offset="0.55" stop-color="#245c97"/>
            <stop offset="1" stop-color="#18a999"/>
        </linearGradient>
        <linearGradient id="screen" x1="0" x2="1">
            <stop offset="0" stop-color="#eaf4ff"/>
            <stop offset="1" stop-color="#bde7ff"/>
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="18" stdDeviation="16" flood-color="#07192d" flood-opacity="0.35"/>
        </filter>
    </defs>

    <rect width="1200" height="520" fill="url(#bg)"/>
    <path d="M0 380 C180 310 300 430 470 345 C650 255 770 350 930 300 C1060 260 1130 210 1200 250 L1200 520 L0 520 Z" fill="#ffffff" opacity="0.14"/>
    <path d="M0 70 H1200" stroke="#ffffff" stroke-opacity="0.09" stroke-width="2"/>
    <path d="M0 165 H1200" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
    <path d="M0 260 H1200" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>
    <path d="M0 355 H1200" stroke="#ffffff" stroke-opacity="0.08" stroke-width="2"/>

