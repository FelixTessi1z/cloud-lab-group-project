        <text x="260" y="265" fill="#1e3c72">&lt;build&gt;</text>
        <text x="260" y="305" fill="#0f7f73">club.create(projects);</text>
        <text x="260" y="345" fill="#1e3c72">&lt;/build&gt;</text>
