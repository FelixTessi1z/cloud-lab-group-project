        <rect x="205" y="185" width="510" height="215" rx="18" fill="#17243a"/>
        <rect x="230" y="212" width="460" height="160" rx="12" fill="url(#screen)"/>
        <rect x="760" y="190" width="225" height="210" rx="18" fill="#eef5ff"/>
        <rect x="800" y="220" width="145" height="18" rx="9" fill="#245c97"/>
        <rect x="800" y="258" width="105" height="14" rx="7" fill="#18a999"/>
