<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
    <title id="title">Technology club story and mission</title>
    <desc id="desc">A visual timeline of a technology club growing through learning, teamwork, and innovation.</desc>
    <defs>
        <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
            <stop offset="0" stop-color="#13294b"/>
            <stop offset="0.5" stop-color="#2866a3"/>
            <stop offset="1" stop-color="#25a18e"/>
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="16" stdDeviation="14" flood-color="#07192d" flood-opacity="0.32"/>
        </filter>
    </defs>
    <rect width="1200" height="520" fill="url(#bg)"/>
    <circle cx="1040" cy="95" r="78" fill="#ffffff" opacity="0.08"/>
    <circle cx="145" cy="410" r="108" fill="#ffffff" opacity="0.08"/>
    <path d="M130 345 C310 230 455 420 610 285 C765 150 895 315 1070 205" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity="0.22"/>

    <g filter="url(#shadow)">
        <rect x="150" y="125" width="900" height="285" rx="26" fill="#f8fbff"/>
        <rect x="205" y="185" width="790" height="8" rx="4" fill="#d7e4f3"/>
        <rect x="205" y="285" width="790" height="8" rx="4" fill="#d7e4f3"/>
        <rect x="205" y="335" width="310" height="28" rx="14" fill="#1e3c72"/>
        <rect x="205" y="370" width="235" height="16" rx="8" fill="#25a18e"/>
    </g>

    <g font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
        <g>
            <circle cx="260" cy="235" r="58" fill="#1e3c72"/>
            <text x="260" y="244" font-size="28" font-weight="700" fill="#ffffff">2022</text>
            <text x="260" y="315" font-size="24" font-weight="700" fill="#1e3c72">Founded</text>
        </g>
        <g>
            <circle cx="485" cy="235" r="58" fill="#25a18e"/>
            <text x="485" y="244" font-size="28" font-weight="700" fill="#ffffff">2023</text>
            <text x="485" y="315" font-size="24" font-weight="700" fill="#1e3c72">Hackathon</text>
        </g>
        <g>
            <circle cx="710" cy="235" r="58" fill="#ffb547"/>
            <text x="710" y="244" font-size="28" font-weight="700" fill="#1e3c72">2024</text>
            <text x="710" y="315" font-size="24" font-weight="700" fill="#1e3c72">Award</text>
        </g>
        <g>
            <circle cx="935" cy="235" r="58" fill="#7a4fb3"/>
            <text x="935" y="244" font-size="28" font-weight="700" fill="#ffffff">150+</text>
            <text x="935" y="315" font-size="24" font-weight="700" fill="#1e3c72">Members</text>
        </g>
    </g>

    <g fill="none" stroke="#9ee8ff" stroke-width="5" stroke-linecap="round" opacity="0.6">
        <path d="M80 90 H175 V55 H245"/>
        <path d="M960 430 H1045 V382 H1130"/>
        <circle cx="80" cy="90" r="8" fill="#9ee8ff"/>
        <circle cx="1130" cy="382" r="8" fill="#9ee8ff"/>
    </g>
</svg>
