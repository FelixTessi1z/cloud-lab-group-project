<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
    <title id="title">Contact and communication sharing</title>
    <desc id="desc">Message bubbles, email cards, and connected profile icons representing contact information sharing.</desc>
    <defs>
